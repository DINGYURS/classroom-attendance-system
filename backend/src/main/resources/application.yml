server:
  port: 9100

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 12MB
  datasource:
    driver-class-name: ${rollcallsystem.datasource.driver-class-name}
    url: jdbc:mysql://${rollcallsystem.datasource.host}:${rollcallsystem.datasource.port}/${rollcallsystem.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${rollcallsystem.datasource.username}
    password: ${rollcallsystem.datasource.password}
  # redis:
  #   host: ${sky.redis.host}
  #   port: ${sky.redis.port}
  #   database: ${sky.redis.database}
  #   timeout: 5000             # Redis йҗЁеӢ®з№ӣйҺәгғЁз§ҙйҸғиҲөжӨӮй—ӮиҫҫзҙқйҚ—жӣҡз¶…е§ЈоӮӨоқ—

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: 'йҚҸг„©е„ҙйҺәгғҘеҪӣ'
      paths-to-match: '/**'
      packages-to-scan: com.project.backend.controller

knife4j:
  enable: false
  setting:
    language: zh_cn

mybatis:
  #mapperй–°е¶Үз–ҶйҸӮеӣҰж¬ў
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.project.backend.pojo.entity
  configuration:
    #еҜ®вӮ¬йҚҡоҲһв”ҳе®„жқҝжҮЎйҚҡ?
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      rollcallsystem:
        mapper: debug
        service: info
        controller: info

rollcallsystem:
  jwt:
    # з’Ғеү§з–Ҷjwtз»ӣжғ§жӮ•йҚ”зҠІзҳ‘йҸғжңөеЁҮйҗўг„§ж®‘з»үж©ҖжҢң
    admin-secret-key: RollCallSystemJasminum-2026-2-10
    # з’Ғеү§з–Ҷjwtжқ©еӣЁж№ЎйҸғе •жЈҝ
    admin-ttl: 86400000
    # з’Ғеү§з–ҶйҚ“е¶ҮоҒ¬жөјзҠ»вӮ¬жҺ•з№ғйҸүгғ§ж®‘жө гӮҮеўқйҚҡе¶ҮРһ
    admin-token-name: token
  minio:
    endpoint: ${rollcallsystem.minio.endpoint}
    access-key: ${rollcallsystem.minio.access-key}
    secret-key: ${rollcallsystem.minio.secret-key}
    bucket-name: ${rollcallsystem.minio.bucket-name}
  python-service:
    # Python з» жҘҒзЎ¶йҸҲе¶…е§ҹйҚҰжқҝжҪғ
    base-url: ${rollcallsystem.python-service.url}
